name: Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      OVSX_PAT: ${{ secrets.OVSX_TOKEN }}
      VSCE_PAT: ${{ secrets.VSCE_TOKEN }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build

      - name: Publish to Open VSX
        working-directory: extension
        # Open VSX (like npm) rejects republishing a version that already succeeded — treat that
        # specific case as a no-op instead of failing the whole run, so a retry (e.g. after the
        # Marketplace step below times out) doesn't get stuck unable to ever reach it again.
        run: |
          set +e
          output=$(npx ovsx publish --no-dependencies -p "$OVSX_PAT" 2>&1)
          status=$?
          echo "$output"
          if [ $status -ne 0 ] && ! echo "$output" | grep -qi "already published"; then
            exit $status
          fi

      - name: Publish to VS Code Marketplace
        if: ${{ env.VSCE_PAT != '' }}
        working-directory: extension
        run: npx vsce publish --no-dependencies -p "$VSCE_PAT"
