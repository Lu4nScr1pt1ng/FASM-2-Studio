name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck

  server-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build --workspace server
      - run: npm run test --workspace server

  debug-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: sudo apt-get update && sudo apt-get install -y gdb
      - run: npm ci
      - run: npm run build --workspace server
      - run: npm run build --workspace debug
      # fasm2 isn't installed on CI runners, so the tests that need a real compiled binary
      # (GdbDriver/session e2e) skip themselves gracefully; the listing/MI parser tests, which
      # run against pre-captured real fasm2/gdb output fixtures, always run here regardless.
      - run: npm run test --workspace debug

  package-matrix:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build

      - name: Run extension integration tests (Linux, virtual display)
        if: runner.os == 'Linux'
        run: xvfb-run -a npm run test --workspace extension

      - name: Run extension integration tests (macOS/Windows)
        if: runner.os != 'Linux'
        run: npm run test --workspace extension

      - name: Package VSIX
        run: npx vsce package --no-dependencies -o fasm2-studio-${{ matrix.os }}.vsix
        working-directory: extension

      - uses: actions/upload-artifact@v4
        with:
          name: fasm2-studio-${{ matrix.os }}
          path: extension/*.vsix
